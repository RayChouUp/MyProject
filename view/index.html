<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正月初八 · 学习冲刺</title>
    <style>
        :root {
            color-scheme: dark;
            --bg-1: #0f1020;
            --bg-2: #1b1d35;
            --accent: #ff4d4f;
            --accent-soft: #ff8a65;
            --gold: #f7c873;
            --text-main: #f7f7fb;
            --text-sub: #d6d8e5;
            --panel: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 20% 15%, rgba(255, 77, 79, 0.24) 0%, transparent 40%),
                radial-gradient(circle at 80% 85%, rgba(247, 200, 115, 0.18) 0%, transparent 45%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2));
            overflow: hidden;
        }

        .halo {
            position: fixed;
            width: 60vmax;
            height: 60vmax;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 77, 79, 0.14), rgba(255, 77, 79, 0));
            filter: blur(8px);
            animation: breathe 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .panel {
            width: min(92vw, 760px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 34px 28px;
            backdrop-filter: blur(10px);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
            z-index: 1;
            animation: fadeUp 0.9s ease both;
        }

        .badge {
            display: inline-block;
            padding: 7px 14px;
            border-radius: 999px;
            font-size: 13px;
            letter-spacing: 1px;
            color: #2f1900;
            background: linear-gradient(90deg, var(--gold), #ffd88c);
            font-weight: 700;
        }

        h1 {
            margin-top: 16px;
            font-size: clamp(1.6rem, 4vw, 2.6rem);
            line-height: 1.24;
            text-wrap: balance;
        }

        .highlight {
            color: var(--gold);
            text-shadow: 0 0 10px rgba(247, 200, 115, 0.35);
        }

        .lead {
            margin-top: 14px;
            color: var(--text-sub);
            font-size: clamp(0.98rem, 2.2vw, 1.12rem);
            line-height: 1.8;
        }

        .lead strong {
            color: #ffe8b8;
            font-weight: 700;
        }

        .mantra {
            margin-top: 22px;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(247, 200, 115, 0.4);
            background: rgba(0, 0, 0, 0.18);
            color: #fff2d3;
            font-size: clamp(0.95rem, 2vw, 1.08rem);
            letter-spacing: 0.4px;
            animation: pulseText 2.2s ease-in-out infinite;
        }

        .meter {
            margin-top: 26px;
        }

        .meter-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.92rem;
            color: var(--text-sub);
        }

        .bar {
            margin-top: 10px;
            height: 11px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.15);
            overflow: hidden;
        }

        .bar-inner {
            height: 100%;
            width: 82%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), var(--gold));
            animation: pressure 1.8s ease-in-out infinite;
            transform-origin: left center;
        }

        .countdown {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 138, 101, 0.45);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .countdown-label {
            color: var(--text-sub);
            font-size: 0.92rem;
        }

        .countdown-time {
            color: #ffe2c2;
            font-size: clamp(1.12rem, 3vw, 1.42rem);
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 138, 101, 0.35);
            animation: pulseClock 1.4s ease-in-out infinite;
            white-space: nowrap;
        }

        .countdown.done .countdown-time {
            color: #ffd4d4;
            text-shadow: 0 0 10px rgba(255, 77, 79, 0.35);
        }

        .footer {
            margin-top: 18px;
            font-size: 0.9rem;
            color: #c9ccda;
        }

        @keyframes breathe {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.95);
                opacity: 0.7;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.06);
                opacity: 1;
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseText {
            0%, 100% {
                box-shadow: 0 0 0 rgba(255, 77, 79, 0.3);
            }
            50% {
                box-shadow: 0 0 18px rgba(255, 77, 79, 0.4);
            }
        }

        @keyframes pressure {
            0%, 100% {
                transform: scaleX(0.96);
                filter: saturate(1);
            }
            50% {
                transform: scaleX(1);
                filter: saturate(1.3);
            }
        }

        @keyframes pulseClock {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.88;
            }
            50% {
                transform: translateY(-1px);
                opacity: 1;
            }
        }

        @media (max-width: 560px) {
            .panel {
                padding: 28px 20px;
            }
            .mantra {
                line-height: 1.65;
            }
        }
    </style>
</head>
<body>
    <div class="halo"></div>

    <main class="panel">
        <span class="badge">2026 · 正月初八</span>
        <h1>
            新的开始，不等明天。<br>
            <span class="highlight">现在就学，马上进入状态。</span>
        </h1>

        <p class="lead">
            今天是正月初八，开工也是开卷。把拖延收住，把计划压实：
            <strong>专注、执行、复盘</strong>。
            你想要的结果，不会自己出现。
        </p>

        <div class="mantra">
            Day Day Up and Under Pressure —— 保持学习张力，今天比昨天更强一点。
        </div>

        <section class="meter" aria-label="学习状态">
            <div class="meter-label">
                <span>学习状态</span>
                <span>冲刺中</span>
            </div>
            <div class="bar">
                <div class="bar-inner"></div>
            </div>
        </section>

        <section class="countdown" aria-label="今日学习倒计时" id="countdownCard">
            <p class="countdown-label">距今日学习收官（23:30）还剩</p>
            <p class="countdown-time" id="countdownText">--:--:--</p>
        </section>

        <p class="footer">提醒：先完成最难的 1 件事，再处理其他任务。</p>
    </main>

    <script>
        (function () {
            const countdownText = document.getElementById('countdownText');
            const countdownCard = document.getElementById('countdownCard');

            function pad(num) {
                return String(num).padStart(2, '0');
            }

            function updateCountdown() {
                const now = new Date();
                const target = new Date(now);
                target.setHours(23, 30, 0, 0);

                const diff = target.getTime() - now.getTime();

                if (diff <= 0) {
                    countdownCard.classList.add('done');
                    countdownText.textContent = '已到 23:30 · 复盘今日';
                    return;
                }

                const totalSeconds = Math.floor(diff / 1000);
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;

                countdownText.textContent = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
            }

            updateCountdown();
            setInterval(updateCountdown, 1000);
        })();
    </script>
</body>
</html>
